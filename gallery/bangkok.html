<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bangkok, Thailand | Photography</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f0f0f;color:#fff;}
.header{padding:40px;text-align:center;}
.header h1{color:#DAA520;margin:0;}
.back{color:#fff;text-decoration:none;display:inline-block;margin-top:10px;opacity:.7;}
.back:hover{opacity:1;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;padding:20px 40px 60px;}
.grid img{width:100%;height:220px;object-fit:cover;border-radius:10px;cursor:pointer;transition:.3s;}
.grid img:hover{transform:scale(1.03);}

.lightbox{display:none;position:fixed;z-index:9999;inset:0;background:rgba(0,0,0,.95);align-items:center;justify-content:center;flex-direction:column;padding:40px;box-sizing:border-box;}
.lightbox.active{display:flex;}
.lightbox-img{max-width:90%;max-height:78vh;object-fit:contain;}
.caption{color:#ccc;text-align:center;margin-top:15px;font-size:15px;}
.close{position:absolute;top:20px;right:35px;color:white;font-size:42px;cursor:pointer;}
.prev,.next{position:absolute;top:50%;transform:translateY(-50%);background:transparent;border:0;color:white;font-size:45px;cursor:pointer;padding:20px;}
.prev{left:20px;}
.next{right:20px;}

@media(max-width:600px){
    .grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));padding:20px;}
    .grid img{height:160px;}
    .prev,.next{font-size:32px;}
}
</style>
</head>

<body>

<div class="header">
    <h1>Bangkok, Thailand</h1>
    <a class="back" href="../photography.html">← Back to Photography</a>
</div>

<div class="grid" id="gallery"></div>

<div id="lightbox" class="lightbox">
    <span class="close" id="closeBtn">&times;</span>
    <button class="prev" id="prevBtn">&#10094;</button>
    <img class="lightbox-img" id="lightbox-img" alt="">
    <div class="caption" id="caption"></div>
    <button class="next" id="nextBtn">&#10095;</button>
</div>

<script>
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const caption = document.getElementById("caption");
const closeBtn = document.getElementById("closeBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const folder = "../photos/bangkok";
const prefix = "BK";
const totalImages = 53;

const captions = [
"Hanging Banana",
"Damnoen Saduak floating market",
"The Life of a Fruit Seller: Fruit seller rowing her boat at Damnoen Saduak Floating Market.",
"Coconut pancake at Damnoen Saduak Floating Market.",
"A Painter's World: The workstation of an artist.",
"Hanging Crafts",
"Songthaew, another form of public transportation in Thailand. Much cheaper than a tuk-tuk and commonly used by locals.",
"The Grand Palace has been the official residence of the Kings of Siam/Thailand since 1782. Today it is still used for official ceremonies.",
"One of the many temple halls inside the Grand Palace.",
"Wat Phra Kaew: Temple of the Emerald Buddha.",
"Restoration work in progress.",
"The test of time... everything fades in the face of time.",
"The glory of Wat Phra Kaew.",
"Buddha statues lining the hallway of the temples at the Grand Palace.",
"Wat Arun: Temple of Dawn.",
"Steps of Wat Arun.",
"Precious Porcelain decorating the walls of Wat Arun.",
"Asiatique The Riverfront along the Chao Phraya River.",
"Caricature artist at work at Asiatique.",
"Japanese-themed street at Asiatique.",
"Itadakimasu!",
"Goddess of the Hidden Garden.",
"When ancient meets modern.",
"Colours of the light.",
"Boat noodle alley near Victory Monument, Bangkok.",
"Wat Chaiwatthanaram: the 'Angkor Wat' of Thailand in Ayutthaya. The central prang is built in Cambodian architectural style.",
"The ruins of Wat Chaiwatthanaram.",
"The war that destroyed many of Ayutthaya's ancient temples.",
"Time travel: A peek into the past.",
"Headless Buddha.",
"Although Wat Chaiwatthanaram lies in ruins, it still stands tall and proud.",
"A journey towards the river.",
"Back of the Buddha.",
"The steps of Wat Chaiwatthanaram.",
"Elephant rides.",
"The hallways of the Grand Palace of Ayutthaya.",
"Wat Phra Sri Sanphet, the model for Bangkok's Temple of the Emerald Buddha.",
"Forgotten prayers.",
"Wat Mahathat: the famous Buddha head embraced by tree roots.",
"Flowers for prayers at Wat Mahathat.",
"Among the ruins of Wat Mahathat.",
"Brick tower.",
"Squirrel scrambling away.",
"Yaowarat, the Chinatown of Bangkok.",
"Pomegranate fruits & fresh juice.",
"Lazy meow at Khlong Thom Night Market.",
"You know you're in Thailand when you see the familiar wai greeting.",
"Talad Rom Hub (Maeklong Railway Market), also known as the 'Closing Umbrella Market'.",
"Life at Maeklong Railway Market: Vendors quickly move everything away as the train passes through the market.",
"Within minutes before the train arrives, vendors pull back umbrellas and make way for the train.",
"Fresh crab for sale at Maeklong Railway Market.",
"Poverty is still very much present here.",
"Troubled Monkey"
];

let currentIndex = 0;

for(let i = 1; i <= totalImages; i++){
    const num = String(i).padStart(3, "0");
    const img = document.createElement("img");
    img.src = `${folder}/${prefix}${num}.jpg`;
    img.alt = captions[i - 1] || `Bangkok ${i}`;

    img.addEventListener("click", () => openLightbox(i - 1));
    gallery.appendChild(img);
}

function openLightbox(index){
    currentIndex = index;
    updateLightbox();
    lightbox.classList.add("active");
}

function closeLightbox(){
    lightbox.classList.remove("active");
}

function updateLightbox(){
    const num = String(currentIndex + 1).padStart(3, "0");
    lightboxImg.src = `${folder}/${prefix}${num}.jpg`;
    lightboxImg.alt = captions[currentIndex] || `Bangkok ${currentIndex + 1}`;
    caption.textContent = captions[currentIndex] || `Bangkok ${currentIndex + 1}`;
}

function showNext(){
    currentIndex = (currentIndex + 1) % totalImages;
    updateLightbox();
}

function showPrev(){
    currentIndex = (currentIndex - 1 + totalImages) % totalImages;
    updateLightbox();
}

closeBtn.addEventListener("click", closeLightbox);
nextBtn.addEventListener("click", showNext);
prevBtn.addEventListener("click", showPrev);

lightbox.addEventListener("click", function(e){
    if(e.target === lightbox) closeLightbox();
});

document.addEventListener("keydown", function(e){
    if(!lightbox.classList.contains("active")) return;
    if(e.key === "Escape") closeLightbox();
    if(e.key === "ArrowRight") showNext();
    if(e.key === "ArrowLeft") showPrev();
});
</script>

</body>
</html>
