<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aotearoa ♥ New Zealand | Photography</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f0f0f;
    color:#fff;
}

.header{
    padding:40px;
    text-align:center;
}

.header h1{
    color:#DAA520;
    margin:0;
}

.back{
    color:#fff;
    text-decoration:none;
    display:inline-block;
    margin-top:10px;
    opacity:0.7;
}

.back:hover{
    opacity:1;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
    padding:20px 40px 60px;
}

.grid img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.grid img:hover{
    transform:scale(1.03);
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    z-index:9999;
    inset:0;
    background:rgba(0,0,0,0.95);
    align-items:center;
    justify-content:center;
    flex-direction:column;
    padding:40px;
    box-sizing:border-box;
}

.lightbox.active{
    display:flex;
}

.lightbox-img{
    max-width:90%;
    max-height:78vh;
    object-fit:contain;
}

.caption{
    color:#ccc;
    text-align:center;
    margin-top:15px;
    font-size:15px;
}

.close{
    position:absolute;
    top:20px;
    right:35px;
    color:white;
    font-size:42px;
    cursor:pointer;
}

.prev,
.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:transparent;
    border:0;
    color:white;
    font-size:45px;
    cursor:pointer;
    padding:20px;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

@media(max-width:600px){
    .grid{
        grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
        padding:20px;
    }

    .grid img{
        height:160px;
    }

    .prev,
    .next{
        font-size:32px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>Aotearoa ♥ New Zealand</h1>
    <a class="back" href="../photography.html">← Back to Photography</a>
</div>

<div class="grid" id="gallery"></div>

<div id="lightbox" class="lightbox">
    <span class="close" id="closeBtn">&times;</span>
    <button class="prev" id="prevBtn">&#10094;</button>
    <img class="lightbox-img" id="lightbox-img" alt="">
    <div class="caption" id="caption"></div>
    <button class="next" id="nextBtn">&#10095;</button>
</div>

<script>
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const caption = document.getElementById("caption");
const closeBtn = document.getElementById("closeBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const folder = "../photos/new-zealand";
const prefix = "NZ";
const totalImages = 55;

const captions = [
    "Mount Hutt, an hour from Christchurch is one of the most popular ski areas catering for all skiers and boarders.",
    "The shapes of Mt Hutt.",
    "Cairn of Christchurch: This cairn is a marker, it marks the river of unease that presently flows through our community, a river whose turbulent waters threaten to divide us.",
    "Glacier hiking in Franz Josef",
    "Glacier ice: The glacier that is Franz Josef... the melt rate is faster than the flow rate. Sadly, in future there won't be such beauty anymore.",
    "Lifeline: Ropes along the Franz Josef hike.",
    "Franz Josef Adventure: of snow, ice & glacier",
    "Steampunk HQ. Oamaru",
    "Train tracks heading towards Steampunk HQ, Oamaru.",
    "Grainstore Gallery, Oamaru.",
    "The faces of many @ Grainstore Gallery, Oamaru",
    "Hidden room @ Grainstore Gallery",
    "Clay Cliffs: The Clay Cliffs at Omarama are made of layers of gravel and silt, deposited by rivers flowing from glaciers existing 1-2 million years ago.",
    "The gift of rain at Clay Cliffs, Omarama.",
    "The Shell picker at Moeraki Boulders of Koekohe Beach, Otago coast.",
    "The Cross: Church of the Good Shepherd is situated on the shores of Lake Tekapo amongst the natural beauty of the lake and the mountains.",
    "The side of the Church overlooking Lake Tekapo.",
    "Man's best friend: George accompanying me on the walking track of Parkwood Farm, Fairlie.",
    "Georgie!",
    "Georgie's Journey: Beautiful mountains on the walking trail of Parkwood Farm, Fairlie.",
    "Meow Power: A cat in need of a pet @ Fairlie town.",
    "Akaroa of the Canterbury Region is a historic French and British settlement nestled in the heart of an ancient volcano.",
    "Silhouette of a woman: The Catlins Cathedral Caves are one of the thirty longest sea caves in the world, located on Waipati Beach, Catlins, South Otago.",
    "Mirror image: Somewhere in Catlins.",
    "Aoraki or Mount Cook is the highest mountain in New Zealand, reaching 3,724m.",
    "Hooker Valley Track is one of the most popular walks in Aoraki Mt Cook National Park. This scenic walk leads us into the foothills of the Southern Alps that offers excellent mountain, glacier and river views.",
    "Hokitika Beach",
    "The horizon of Hokitika",
    "The sands of Hokitika",
    "Castle Hill: It got its name because of the imposing array of limestone boulders in the area reminiscent of an old, run-down stone castle. They filmed Chronicles of Narnia somewhere near here.",
    "Medland beach of Abel Tasman National Park",
    "Wairariki Beach of the Golden Bay area, Tasman Region is a wild, beautiful place where wind and waves have created massive rock and sand dune formations.",
    "Farewell Spit, at the tip of the South Island, is New Zealand's longest sand spit.",
    "Water trails: somewhere at Golden Bay area, Tasman region",
    "Reflection: somewhere at Golden Bay area, Tasman region",
    "Ducks Love Story: Feathers long forgotten at Wanaka.",
    "Reconstructed example of how the Chinese Miner settlements look like at Goldfields mining centre, Cromwell.",
    "Cow made by recyclable materials, spotted at Queenstown.",
    "Freedom Flyer of Queenstown",
    "Lake Dunstan of Cromwell.",
    "Old Cromwell Town Historic Reserve. This is how Cromwell looks in olden times.",
    "Kaikoura of the north Canterbury Region.",
    "Kaikoura's Beauty: By the coast of Kaikoura, North Canterbury.",
    "Sunbathing seal",
    "The dream of a bird: Looking towards the Kaikoura coast.",
    "Seal pups playing at Ohau Stream, Kaikoura",
    "Seal heaven: Seal lazing around by the Kaikoura Peninsula.",
    "Aranui Cave at the Ruakuri Scenic Reserve. It is named after Ruruku Aranui, the local Maori man who first discovered this previously hidden gem back in 1910.",
    "Inferno Crater Lake, the largest geyser-like feature in the world at Waimangu Volcanic Valley, Rotorua.",
    "Mt Maunganui: the mountain by the sea.",
    "Te Waihou Blue Spring: Te Waihou, meaning 'the new water'. The colour of the Blue Spring is due to the high optical purity of the water.",
    "Daisy of Te Waihou walkway.",
    "Baa baa... @ One Tree Hill, Auckland.",
    "My model is a sheep! :p",
    "Spring in Parnell Village, Auckland"
];

let currentIndex = 0;

for(let i = 1; i <= totalImages; i++){
    const num = String(i).padStart(3, "0");
    const img = document.createElement("img");

    img.src = `${folder}/${prefix}${num}.jpg`;
    img.alt = captions[i - 1] || `New Zealand ${i}`;

    img.addEventListener("click", () => {
        openLightbox(i - 1);
    });

    gallery.appendChild(img);
}

function openLightbox(index){
    currentIndex = index;
    updateLightbox();
    lightbox.classList.add("active");
}

function closeLightbox(){
    lightbox.classList.remove("active");
}

function updateLightbox(){
    const num = String(currentIndex + 1).padStart(3, "0");
    lightboxImg.src = `${folder}/${prefix}${num}.jpg`;
    lightboxImg.alt = captions[currentIndex] || `New Zealand ${currentIndex + 1}`;
    caption.textContent = captions[currentIndex] || `New Zealand ${currentIndex + 1}`;
}

function showNext(){
    currentIndex = (currentIndex + 1) % totalImages;
    updateLightbox();
}

function showPrev(){
    currentIndex = (currentIndex - 1 + totalImages) % totalImages;
    updateLightbox();
}

closeBtn.addEventListener("click", closeLightbox);
nextBtn.addEventListener("click", showNext);
prevBtn.addEventListener("click", showPrev);

lightbox.addEventListener("click", function(e){
    if(e.target === lightbox){
        closeLightbox();
    }
});

document.addEventListener("keydown", function(e){
    if(!lightbox.classList.contains("active")) return;

    if(e.key === "Escape") closeLightbox();
    if(e.key === "ArrowRight") showNext();
    if(e.key === "ArrowLeft") showPrev();
});
</script>

</body>
</html>
