  <link href="../cdn2.editmysite.com/fonts/Open_Sans/fontc81e.css?2" rel="stylesheet" type="text/css" />
  <link href="../cdn2.editmysite.com/fonts/Alice/fontc81e.css?2" rel="stylesheet" type="text/css" />
  <link href="../cdn2.editmysite.com/fonts/Raleway/fontc81e.css?2" rel="stylesheet" type="text/css" />
  <link href="../cdn2.editmysite.com/fonts/Actor/fontc81e.css?2" rel="stylesheet" type="text/css" />

  <style>
    body {
      background: #000;
      color: #d5d5d5;
    }

    .wsite-menu-default a {
      font-family: "Actor", sans-serif !important;
    }

    a {
      color: #daa520;
    }

    #wsite-content .paragraph,
    #wsite-content div.paragraph {
      color: #d5d5d5;
      line-height: 1.6;
    }

    .contact-section {
      max-width: 760px;
      margin: 0 auto 40px;
      padding: 10px 20px 30px;
      text-align: center;
    }

    .contact-title {
      margin: 10px 0 8px;
      font-family: "Alice", serif;
      font-size: 42px;
      line-height: 1.2;
      color: #daa520;
      font-weight: 700;
    }

    .contact-intro {
      max-width: 620px;
      margin: 0 auto 28px;
      color: #d5d5d5;
      font-size: 15px;
      line-height: 1.8;
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(218, 165, 32, 0.32);
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      text-align: left;
    }

    .contact-form label {
      display: block;
      margin: 0 0 8px;
      color: #f4f4f4;
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      box-sizing: border-box;
      margin: 0 0 18px;
      padding: 13px 14px;
      border: 1px solid rgba(218, 165, 32, 0.35);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.38);
      color: #fff;
      font-family: "Open Sans", sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #daa520;
      box-shadow: 0 0 0 3px rgba(218, 165, 32, 0.14);
      background: rgba(0, 0, 0, 0.55);
    }

    .contact-form textarea {
      min-height: 170px;
      resize: vertical;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: rgba(255, 255, 255, 0.42);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .send-button {
      display: inline-block;
      width: auto;
      min-width: 160px;
      margin-top: 4px;
      padding: 13px 24px;
      border: 1px solid #daa520;
      border-radius: 999px;
      background: #daa520;
      color: #000;
      font-family: "Actor", sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .send-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(218, 165, 32, 0.25);
      background: #f0c24a;
    }

    .form-note {
      margin-top: 16px;
      color: #969696;
      font-size: 12px;
      line-height: 1.6;
    }

    @media screen and (max-width: 700px) {
      #sitename img {
        margin-left: 0 !important;
        max-width: 100%;
        height: auto;
      }

      .contact-section {
        padding-left: 10px;
        padding-right: 10px;
      }

      .contact-title {
        font-size: 34px;
      }

      .contact-card {
        padding: 22px;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }
  </style>
</head>
<body class="wsite-theme-dark wsite-page-contact-me">
  <div id="wrapper">
    <div class="bg-wrapper">
      <div id="header">
        <div id="sitename"><span class="wsite-logo">
          <a href="index.html">
            <img src="uploads/4/7/1/4/47149761/1434723644.png" style="margin-left:82px;" alt="J.F. Ng creative portfolio" />
          </a>
        </span></div>
      </div>

      <div id="navigation"><ul class="wsite-menu-default">
        <li id="pg319614051433013729" class="wsite-menu-item-wrap"><a href="content-creation.html" class="wsite-menu-item">Content Creation</a></li>
        <li id="pg470820302195854691" class="wsite-menu-item-wrap"><a href="creative-writing.html" class="wsite-menu-item">Creative Writing</a></li>
        <li id="pg241906369806147596" class="wsite-menu-item-wrap"><a href="photography.html" class="wsite-menu-item">Photography</a></li>
        <li id="pg245172488277880748" class="wsite-menu-item-wrap"><a href="sketchesdrawing.html" class="wsite-menu-item">Sketches/Drawing</a></li>
        <li id="pg541281524342281234" class="wsite-menu-item-wrap"><a href="2d-digital.html" class="wsite-menu-item">2D Digital</a></li>
        <li id="pg802063007208933664" class="wsite-menu-item-wrap"><a href="3d-artworks.html" class="wsite-menu-item">3D Artworks</a></li>
        <li id="active" class="wsite-menu-item-wrap"><a href="contact-me.html" class="wsite-menu-item">Contact Me</a></li>
      </ul></div>

      <div id="content-wrapper">
        <div id="content">
          <div id="wsite-content" class="wsite-elements wsite-not-footer">
            <section class="contact-section">
              <h1 class="contact-title">Contact Me</h1>
              <p class="contact-intro">
                Have a project, collaboration, feedback, or a simple hello? Send me a message through the form below.
              </p>

              <div class="contact-card">
                <form class="contact-form" action="https://formsubmit.co/jfoongng@gmail.com" method="POST">
                  <input type="hidden" name="_subject" value="New message from J.F. Ng portfolio" />
                  <input type="hidden" name="_captcha" value="true" />
                  <input type="hidden" name="_template" value="table" />
                  <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

                  <div class="form-row">
                    <div>
                      <label for="name">Name *</label>
                      <input id="name" type="text" name="name" placeholder="Your name" required />
                    </div>
                    <div>
                      <label for="email">Email *</label>
                      <input id="email" type="email" name="email" placeholder="Your email address" required />
                    </div>
                  </div>

                  <label for="subject">Subject</label>
                  <input id="subject" type="text" name="subject" placeholder="What is this about?" />

                  <label for="message">Message *</label>
                  <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>

                  <button class="send-button" type="submit">Send Message</button>
                </form>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
